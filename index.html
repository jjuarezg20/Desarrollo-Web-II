<head>

  <title>Desarrollo Web II</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #24334a;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22d3ee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background: linear-gradient(145deg, #0b1220, #101c34 55%, #0d2330);
      color: var(--text);
      min-height: 100vh;
    }

    main {
      width: min(980px, 92%);
      margin: 0 auto;
      padding: 2.2rem 0 3rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      margin-bottom: 1rem;
    }

    .top-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-bottom: 1.4rem;
    }

    .top-links a {
      text-decoration: none;
      color: #082033;
      background: var(--accent);
      font-weight: 700;
      padding: 0.55rem 0.85rem;
      border-radius: 999px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 0.9rem;
    }

    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 1rem;
    }

    .card h2 {
      font-size: 1.05rem;
      margin-bottom: 0.65rem;
    }

    .card ul {
      list-style: none;
      display: grid;
      gap: 0.45rem;
    }

    .card a {
      color: var(--text);
      text-decoration: none;
    }

    .card a:hover {
      color: var(--accent);
    }

    .g1 { grid-column: span 12; }
    .g3, .g4, .g5 { grid-column: span 4; }

    @media (max-width: 800px) {
      .g3, .g4, .g5 { grid-column: span 12; }
    }
  </style>
</head>

    </div>

    <section class="grid">

          <li><a href="Gu%C3%ADa1_20235076/complementario/carros.html">Complementario - Carros</a></li>
        </ul>
      </article>

      <article class="card g3">
